site:
  title: Notesbase Docs
  # Set this to your GitHub Pages URL once known, e.g.:
  # url: https://<owner>.github.io/notesbase

content:
  sources:
    - url: .
      # 'HEAD' always includes the currently checked-out branch.
      # Add branch names to include additional branches, e.g. [HEAD, dev].
      branches: [ HEAD, main ]
      # Include all semver tags (v0.1.0, v1.2.3, …). Remove to skip tags.
      tags: [ 'v*' ]
      start_path: docs

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true

output:
  dir: ./build/site
