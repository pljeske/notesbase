image:
  registry: ghcr.io
  owner: "pljeske"
  tag: ""
  pullPolicy: IfNotPresent

# Image pull secrets for private registries (e.g. [{name: regcred}])
imagePullSecrets: []

# Optional: create a dedicated ServiceAccount for the application pods.
# Set create=true and optionally provide a name; defaults to "<release-name>".
# Set annotations to attach cloud IAM roles (e.g. IRSA, Workload Identity).
serviceAccount:
  create: false
  name: ""
  annotations: {}

backend:
  replicaCount: 1
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources:
    requests:
      cpu: 100m
      memory: 56Mi
    limits:
      cpu: 500m
      memory: 256Mi

frontend:
  replicaCount: 1
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources:
    requests:
      cpu: 100m
      memory: 56Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  annotations: {}
  className: ""
  host: "notesbase.example.com"
  tls: []
  #  - secretName: notesbase-tls
  #    hosts:
  #      - notesbase.example.com

config:
  # Name of a pre-existing Secret to use instead of the chart-managed one.
  # The secret must contain: DATABASE_URL, JWT_SECRET, MINIO_ACCESS_KEY, MINIO_SECRET_KEY.
  # When set, the chart will not create its own Secret.
  existingSecret: ""
  # Required when existingSecret is not set: strong random value (e.g. openssl rand -hex 32)
  jwtSecret: ""
  # CORS origin(s) sent to browsers. Defaults to https://<ingress.host> when
  # ingress.host is set. Override if you need multiple origins.
  corsAllowedOrigins: ""
  disableRegistration: false
  minioBucket: notesbase-files
  minioUseSSL: "false"
  maxUploadSize: "52428800" # bytes

# External PostgreSQL — used when postgres.enabled=false.
# Provide a full connection URL: postgres://user:pass@host:5432/db?sslmode=require
externalDatabase:
  url: ""

# External MinIO/S3 — used when minio.enabled=false.
externalMinio:
  endpoint: ""   # e.g. s3.amazonaws.com or minio.example.com:9000
  accessKey: ""
  secretKey: ""

# groundhog2k PostgreSQL subchart — https://github.com/groundhog2k/helm-charts/tree/master/charts/postgres
postgres:
  enabled: true
  settings:
    # needs to be created manually with the key POSTGRES_PASSWORD
    existingSecret: postgres-secret
    authMethod: "md5"
  userDatabase:
    name:
      value: notesbase
    user:
      value: notesbase
    password:
      value: ""   # change this
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Official MinIO subchart — https://charts.min.io/
minio:
  enabled: true
  rootUser: notesbase
  rootPassword: ""
  buckets:
    - name: notesbase-files
      policy: none
      purge: false
  # Disable MinIO console in production
  consoleService:
    type: ClusterIP
  mode: standalone
  persistence:
    enabled: true
    size: 5Gi
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
