{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-notesbase
  labels:
    {{- include "notesbase.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API and health routes go to the backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  name: http
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port:
                  name: http
          # Everything else goes to the frontend (Caddy serves static SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  name: http
{{- end }}
