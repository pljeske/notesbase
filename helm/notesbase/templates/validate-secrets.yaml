{{/*
Pre-flight checks: verify that externally-managed secrets exist in the target
namespace before any resources are created. `lookup` returns an empty dict when
the object is not found, so an empty `.metadata.name` means it's missing.

Note: `lookup` is silently skipped during `helm template` (no live API server),
so we probe a well-known object (the release namespace itself) to detect that
condition and skip validation rather than producing a false-negative failure.
*/}}

{{- $liveCluster := lookup "v1" "Namespace" "" .Release.Namespace }}
{{- if $liveCluster }}
  {{- if .Values.postgres.settings.existingSecret }}
    {{- $pgSecret := lookup "v1" "Secret" .Release.Namespace .Values.postgres.settings.existingSecret }}
    {{- if not $pgSecret.metadata }}
      {{- fail (printf "Required secret '%s' not found in namespace '%s'. Create it before installing." .Values.postgres.settings.existingSecret .Release.Namespace) }}
    {{- end }}
  {{- end }}
  {{- if .Values.config.existingSecret }}
    {{- $appSecret := lookup "v1" "Secret" .Release.Namespace .Values.config.existingSecret }}
    {{- if not $appSecret.metadata }}
      {{- fail (printf "Required secret '%s' not found in namespace '%s'. Create it before installing." .Values.config.existingSecret .Release.Namespace) }}
    {{- end }}
  {{- end }}
{{- end }}
