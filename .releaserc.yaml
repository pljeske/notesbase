plugins:
  - name: "@go-semantic-release/commit-analyzer-cz"
    options:
      # feat:  → minor
      # fix:   → patch
      # feat!/fix! or BREAKING CHANGE footer → major
      # chore:, docs:, style:, refactor:, test:, ci: → no release
      typeFeatures: [feat]
      typeBugFixes: [ fix ]

  - name: "@go-semantic-release/changelog-generator-default"

  - name: "@go-semantic-release/updater-helm"
    options:
      path: helm/notesbase/Chart.yaml

  - name: "@go-semantic-release/updater-npm"
    options:
      path: frontend/package.json

  - name: "@go-semantic-release/github"
    options:
      emojis: false
