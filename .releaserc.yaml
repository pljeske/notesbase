plugins:
  - name: "@go-semantic-release/commit-analyzer-cz"
    options:
      # feat: → minor, fix: → patch, feat!/fix! or BREAKING CHANGE → major
      # chore:, docs:, style:, refactor:, test:, ci: → no release
      typeFeatures: [feat]
      typeBugFixes: [fix]
      typeBreaking: []   # handled via ! suffix and BREAKING CHANGE footer

  - name: "@go-semantic-release/changelog-generator-default"

  - name: "@go-semantic-release/github"
    options:
      emojis: false
