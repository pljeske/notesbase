      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/notesbase-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/notesbase-frontend:buildcache,mode=max
