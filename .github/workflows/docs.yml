name: Publish Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build with Antora
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for all tags and branches)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Antora
        run: npm install -g @antora/cli @antora/site-generator

      - name: Inject valid tagged versions into playbook
        run: |
          # Collect tags that actually contain docs/antora.yml.
          # Older tags pre-dating the docs directory are silently skipped.
          mapfile -t VALID_TAGS < <(
            git tag -l 'v*' | while IFS= read -r tag; do
              git ls-tree "$tag" -- docs/antora.yml 2>/dev/null | grep -q . && echo "$tag"
            done
          )
          if [ ${#VALID_TAGS[@]} -gt 0 ]; then
            TAGS_CSV=$(printf '"%s",' "${VALID_TAGS[@]}" | sed 's/,$//')
            yq -i ".content.sources[0].tags = [$TAGS_CSV]" antora-playbook.yml
            echo "Tagged versions included: ${VALID_TAGS[*]}"
          else
            echo "No tagged versions with docs found; building branches only"
          fi

      - name: Build docs
        run: antora antora-playbook.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
